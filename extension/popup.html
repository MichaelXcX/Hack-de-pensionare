<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Anarchist</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>The Anarchist</h1>

    <nav class="tabs">
      <button class="tab active" data-tab="home">Home</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>

    <section id="home" class="tab-content active">
      <p>Options:</p>
      <div class="feature-list">
        <button id="btn-stutter-speak" class="feature-btn">&#127908; Stutter Speak</button>
        <button id="btn-stop-speak" class="feature-btn stop-btn" disabled>&#9724; Stop</button>
        <button id="btn-touch-grass-toggle" class="feature-btn">&#127807; Auto Touch Grass: OFF</button>
        <button id="btn-mean-mode" class="feature-btn">&#128520; Mean Mode: OFF</button>
        <button id="btn-kill-mode" class="feature-btn">💀 Kill Mode: OFF</button>
        <button id="btn-leetcode-roast" class="feature-btn">&#128293; LeetCode Roast</button>
        <button id="btn-burnout-mode" class="feature-btn">&#128293; Burnout Mode: OFF</button>
      </div>
      <div id="status" class="status"></div>
      <div class="intensity-row">
        <label for="intensity-slider">Stutter intensity</label>
        <input type="range" id="intensity-slider" min="0" max="100" value="50">
        <span id="intensity-value">50%</span>
      </div>
    </section>

    <section id="settings" class="tab-content">
      <h2>Settings</h2>
      <label>
        <input type="checkbox" id="toggle-notifications"> Enable notifications
      </label>
      <br>
      <a href="#" id="open-options">Advanced options</a>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
