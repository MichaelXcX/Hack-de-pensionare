<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hack de Pensionare</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Hack de Pensionare</h1>

    <nav class="tabs">
      <button class="tab active" data-tab="home">Home</button>
      <button class="tab" data-tab="tools">Tools</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>

    <section id="home" class="tab-content active">
      <p>Welcome! Select a feature below.</p>
      <div class="feature-list">
        <button id="btn-feature-1" class="feature-btn">Feature 1</button>
        <button id="btn-feature-2" class="feature-btn">Feature 2</button>
        <button id="btn-feature-3" class="feature-btn">Feature 3</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section id="tools" class="tab-content">
      <h2>Tools</h2>
      <p>Additional tools go here.</p>
    </section>

    <section id="settings" class="tab-content">
      <h2>Settings</h2>
      <label>
        <input type="checkbox" id="toggle-notifications"> Enable notifications
      </label>
      <br>
      <a href="#" id="open-options">Advanced options</a>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
